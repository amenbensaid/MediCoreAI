services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medicore_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicore_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-medicore_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - medicore_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medicore_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: ${API_INTERNAL_PORT:-5000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3100}
      JITSI_BASE_URL: ${JITSI_BASE_URL:-https://meet.jit.si}
      JITSI_ROOM_PREFIX: ${JITSI_ROOM_PREFIX:-medicore}
      JITSI_ROOM_SECRET: ${JITSI_ROOM_SECRET:?JITSI_ROOM_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3100}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      - "${BACKEND_PORT:-5101}:${API_INTERNAL_PORT:-5000}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medicore_network
    restart: unless-stopped

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicore_frontend
    ports:
      - "${FRONTEND_PORT:-3100}:80"
    depends_on:
      - backend
    networks:
      - medicore_network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  medicore_network:
    driver: bridge
